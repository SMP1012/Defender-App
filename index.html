<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defender: Pro Edition</title>
    <style>
        :root { --green: #1b5e20; --gold: #fbc02d; --red: #b71c1c; --blue: #0d47a1; --light: #f1f8e9; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #cfd8dc; margin: 0; padding: 10px; touch-action: manipulation; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); max-width: 480px; margin: auto; }
        h2 { text-align: center; color: var(--green); margin: 0 0 5px 0; }
        .setup-input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-main { background: var(--green); color: white; }
        .btn-bump { background: var(--red); color: white; border: 3px solid #ffcdd2; }
        .btn-summary { background: var(--blue); color: white; }
        .btn-noblood { background: #607d8b; color: white; margin-bottom: 10px; }
        .unit-display { background: #fff9c4; padding: 10px; text-align: center; font-weight: bold; border-radius: 8px; margin-bottom: 15px; border: 2px dashed var(--gold); }
        
        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .column-label { text-align: center; font-weight: 800; font-size: 12px; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        .chip { padding: 12px 5px; border: 2px solid #ddd; border-radius: 10px; font-size: 12px; cursor: pointer; background: #fff; text-align: center; font-weight: 800; color: #666; margin-bottom: 5px; }
        .chip.active { background: var(--green); color: white; border-color: #0e3d14; }
        .chip.ranch-chip.active { background: var(--gold); color: #333; border-color: #f9a825; }
        
        .defender-box { background: var(--light); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--green); }
        .trailing-option { background: #fff3e0; color: #e65100; border: 1px solid #ffb74d; padding: 12px; border-radius: 8px; margin-top: 10px; }
        .choice-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-choice { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .summary-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); color: white; z-index: 100; display: none; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-screen">
        <h2>🛡️ Defender Setup</h2>
        <label>Stake ($ per point):</label>
        <input type="number" id="baseUnit" value="0.25" step="0.01" class="setup-input">
        <input type="text" id="p1" placeholder="Player 1" class="setup-input">
        <input type="text" id="p2" placeholder="Player 2" class="setup-input">
        <input type="text" id="p3" placeholder="Player 3" class="setup-input">
        <input type="text" id="p4" placeholder="Player 4" class="setup-input">
        <input type="text" id="p5" placeholder="Player 5" class="setup-input">
        <button class="btn btn-main" onclick="initGame()">START ROUND</button>
    </div>

    <div id="game-screen" style="display:none;">
        <h2 id="hole-header">Hole 1</h2>
        <div class="unit-display" id="stake-display"></div>
        
        <div id="bump-info" style="text-align:center; font-weight:bold; color:var(--red); font-size: 0.85em; margin-bottom:5px;"></div>
        <button id="bump-btn" class="btn btn-bump" onclick="applyBump()">BUMP (2x Stakes)</button>

        <div class="defender-box">
            <div id="def-display-name" style="font-size: 1.1rem; font-weight: 900;"></div>
            <select id="partner-pick" class="setup-input" style="margin:5px 0;"></select>
            
            <div id="endgame-choice" class="trailing-option" style="display:none;">
                <div id="choice-text"></div>
                <div class="choice-btns">
                    <button class="btn-choice" style="background:var(--green); color:white;" onclick="acceptDefender()">Defend</button>
                    <button class="btn-choice" style="background:#ddd;" onclick="passDefender()">Pass</button>
                </div>
            </div>
        </div>

        <div class="score-grid">
            <div>
                <div class="column-label">Defender Team</div>
                <div class="chip" id="d-lb" onclick="toggleNet('d','lb')">Low Ball (2)</div>
                <div class="chip" id="d-lt" onclick="toggleNet('d','lt')">Low Total (2)</div>
                <div class="chip" id="d-px" onclick="toggleNet('d','px')">Prox (1)</div>
                <div class="chip ranch-chip" id="d-br" onclick="toggleNetRanch('d')">RANCH (12)</div>
            </div>
            <div>
                <div class="column-label">The Field</div>
                <div class="chip" id="f-lb" onclick="toggleNet('f','lb')">Low Ball (2)</div>
                <div class="chip" id="f-lt" onclick="toggleNet('f','lt')">Low Total (2)</div>
                <div class="chip" id="f-px" onclick="toggleNet('f','px')">Prox (1)</div>
                <div class="chip ranch-chip" id="f-br" onclick="toggleNetRanch('f')">RANCH (12)</div>
            </div>
        </div>

        <button class="btn btn-noblood" onclick="noBlood(true)">NO BLOOD / PUSH</button>
        <button class="btn btn-main" onclick="processHole()">POST SCORE</button>
        
        <div id="leaderboard" style="margin-top:15px;"></div>
        <button class="btn btn-summary" style="margin-top:15px" onclick="showSummary()">💰 PAYOUTS / END</button>
        <button class="btn btn-outline" id="undo-btn" onclick="undoLastHole()" style="display:none; width:100%; margin-top:10px;">↺ Undo Hole</button>
    </div>
</div>

<div id="summary-screen" class="summary-overlay">
    <h2>Ranked Summary</h2>
    <div id="final-stats"></div>
    <hr style="opacity:0.2">
    <h3>Settlements</h3>
    <div id="payout-logic"></div>
    <button class="btn btn-main" style="margin-top:20px" onclick="closeSummary()">Back</button>
    <button class="btn btn-bump" onclick="location.reload()">Reset Match</button>
</div>

<script>
    let players = [], history = [], hole = 1, defIdx = 0, baseUnit = 0.25, currentUnit = 0.25;
    let bumpsOut = 0, bumpedThisHole = false, activeDefIdx = 0;
    let endgamePassCount = 0;
    let scores = { d: {lb:0, lt:0, px:0, br:0}, f: {lb:0, lt:0, px:0, br:0} };

    function initGame() {
        baseUnit = parseFloat(document.getElementById('baseUnit').value) || 0.25;
        currentUnit = baseUnit;
        for(let i=1; i<=5; i++) {
            let n = document.getElementById('p'+i).value.trim() || "Player "+i;
            players.push({ name: n, points: 0 });
        }
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        activeDefIdx = 0;
        updateUI();
    }

    function toggleNet(team, type) {
        let val = (type === 'px') ? 1 : 2;
        let otherTeam = (team === 'd') ? 'f' : 'd';
        
        if (!scores[team][type]) {
            scores[otherTeam][type] = 0;
            scores[team][type] = val;
        } else {
            scores[team][type] = 0;
        }
        scores.d.br = 0; scores.f.br = 0; 
        renderChips();
    }

    function toggleNetRanch(team) {
        let state = scores[team].br ? 0 : 12;
        scores.d = { lb:0, lt:0, px:0, br:0 };
        scores.f = { lb:0, lt:0, px:0, br:0 };
        if(state) scores[team] = { lb:2, lt:2, px:1, br:12 };
        renderChips();
    }

    function renderChips() {
        ['d','f'].forEach(t => {
            ['lb','lt','px','br'].forEach(p => {
                let el = document.getElementById(`${t}-${p}`);
                if(scores[t][p]) el.classList.add('active');
                else el.classList.remove('active');
            });
        });
    }

    function applyBump() {
        currentUnit *= 2; bumpedThisHole = true; bumpsOut++;
        updateUI();
    }

    function getEndgameSequence() {
        return [...players].map((p,i)=>({p,i})).sort((a,b)=>a.p.points - b.p.points);
    }

    function acceptDefender() {
        let seq = getEndgameSequence();
        activeDefIdx = seq[endgamePassCount].i;
        updateUI();
    }

    function passDefender() {
        endgamePassCount++;
        if(endgamePassCount >= 5) {
            activeDefIdx = defIdx; 
        }
        updateUI();
    }

    function noBlood(advance) {
        scores = { d: {lb:0, lt:0, px:0, br:0}, f: {lb:0, lt:0, px:0, br:0} };
        renderChips();
        if(advance) processHole(true);
    }

    function processHole(isPush = false) {
        let partnerIdx = parseInt(document.getElementById('partner-pick').value);
        if (!isPush && isNaN(partnerIdx)) return alert("Select partner!");

        history.push(JSON.parse(JSON.stringify({ players, hole, defIdx, currentUnit, bumpedThisHole, bumpsOut, activeDefIdx, endgamePassCount })));
        
        if(!isPush) {
            let dTotal = scores.d.br || (scores.d.lb + scores.d.lt + scores.d.px);
            let fTotal = scores.f.br || (scores.f.lb + scores.f.lt + scores.f.px);
            let netPerFieldPlayer = (dTotal - fTotal) * (currentUnit / baseUnit);
            let totalPot = netPerFieldPlayer * 3;

            let defPoints = Math.ceil(totalPot / 2);
            if (totalPot < 0) defPoints = Math.floor(totalPot / 2);
            let partnerPoints = totalPot - defPoints;

            players.forEach((p, i) => {
                if(i === activeDefIdx) p.points += defPoints;
                else if(i === partnerIdx) p.points += partnerPoints;
                else p.points -= netPerFieldPlayer;
            });
        }

        hole++; 
        defIdx = (defIdx + 1) % 5;
        activeDefIdx = defIdx; 
        endgamePassCount = 0;
        bumpedThisHole = false;
        noBlood(false); 
        if(hole === 10) { currentUnit = baseUnit; bumpsOut = 0; alert("Turn: Stakes & Bumps Reset!"); }
        updateUI();
    }

    function undoLastHole() {
        let last = history.pop();
        players = last.players; hole = last.hole; defIdx = last.defIdx;
        currentUnit = last.currentUnit; bumpedThisHole = last.bumpedThisHole;
        bumpsOut = last.bumpsOut; activeDefIdx = last.activeDefIdx;
        endgamePassCount = last.endgamePassCount;
        updateUI();
    }

    function updateUI() {
        document.getElementById('hole-header').innerText = `Hole ${hole}`;
        document.getElementById('stake-display').innerText = `Stake: $${currentUnit.toFixed(2)} / pt | Bumps: ${bumpsOut}`;
        document.getElementById('undo-btn').style.display = history.length ? 'block' : 'none';

        let sorted = [...players].map((p,i)=>({p,i})).sort((a,b)=>a.p.points - b.p.points);
        let minPoints = sorted[0].p.points;
        let controlsBump = sorted.filter(x => x.p.points === minPoints).map(x => x.p.name);

        const choiceBox = document.getElementById('endgame-choice');
        if(hole >= 16 && hole <= 18 && endgamePassCount < 5 && history.length < hole) {
            let seq = getEndgameSequence();
            let currentOption = seq[endgamePassCount];
            choiceBox.style.display = 'block';
            document.getElementById('choice-text').innerHTML = `<b>${currentOption.p.name}</b>: Defend or Pass?`;
            
            document.getElementById('bump-info').innerText = `Bump control: ${currentOption.p.name}`;
        } else {
            choiceBox.style.display = 'none';
            document.getElementById('bump-info').innerText = `Bump control: ${controlsBump.join(', ')}`;
        }

        document.getElementById('def-display-name').innerText = `Defender: ${players[activeDefIdx].name}`;

        const pSelect = document.getElementById('partner-pick');
        pSelect.innerHTML = "<option disabled selected>Select Partner</option>";
        players.forEach((p, i) => {
            if(i !== activeDefIdx) pSelect.add(new Option(p.name, i));
        });

        const lb = document.getElementById('leaderboard');
        lb.innerHTML = "<b>Live Standings</b>";
        players.forEach(p => {
            let cash = (p.points * baseUnit).toFixed(2);
            lb.innerHTML += `<div class="player-row"><span>${p.name}</span><b>$${cash} (${p.points} pts)</b></div>`;
        });
    }

    function showSummary() {
        document.getElementById('summary-screen').style.display = 'block';
        let statsHtml = "";
        let sorted = [...players].sort((a,b) => b.points - a.points);
        sorted.forEach(p => {
            let cash = (p.points * baseUnit).toFixed(2);
            statsHtml += `<div class="player-row" style="color:white"><span>${p.name}</span><b>$${cash} (${p.points} pts)</b></div>`;
        });
        document.getElementById('final-stats').innerHTML = statsHtml;
        
        let balances = players.map(p => ({ name: p.name, amt: p.points * baseUnit }));
        let winners = balances.filter(b => b.amt > 0.001).sort((a,b) => b.amt - a.amt);
        let losers = balances.filter(b => b.amt < -0.001).sort((a,b) => a.amt - b.amt);
        let payoutHtml = "";
        losers.forEach(l => {
            let toPay = Math.abs(l.amt);
            winners.forEach(w => {
                if(toPay > 0.001 && w.amt > 0.001) {
                    let pay = Math.min(toPay, w.amt);
                    payoutHtml += `<div style="margin-bottom:5px">💸 ${l.name} pays ${w.name}: $${pay.toFixed(2)}</div>`;
                    toPay -= pay; w.amt -= pay;
                }
            });
        });
        document.getElementById('payout-logic').innerHTML = payoutHtml || "All Square";
    }

    function closeSummary() { document.getElementById('summary-screen').style.display = 'none'; }
</script>
</body>
</html>
